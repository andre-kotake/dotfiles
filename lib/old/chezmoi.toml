# DATA
sourceDir = "# {{ .chezmoi.config.sourceDir }}"

[scriptEnv]
# Usa a config do Bashly do source, já que o arquivo pode não existir.
BASHLY_SETTINGS_PATH  = "# {{- .chezmoi.config.sourceDir -}}/home/private_dot_config/private_bashly/private_settings.yml"

[status]
exclude = ["scripts"]

[diff]
command = "delta"
exclude = ["scripts"]

[data.configs]
shell = "bash"
# shell = "#{{ $shell }}"
# git.oauth_token = "#{{ $git_oauth_token }}"

[data.osInfo]
id = "# {{ $osId }}"
release = "# {{ $osRelease }}"
isAndroid = # {{ eq $osId "android" }}
isOpenSuse = # {{ eq $osRelease "opensuse-tumbleweed" }}
isDebian = # {{ eq $osRelease "debian" }}

[keepassxc]
database = "# {{ joinPath .chezmoi.homeDir "Documents" "DB" "main.kdbx" }}"

[pinentry]
command = "pinentry-curses"
